name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: |
          uv sync
          uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Mypy
        run: uv run mypy src/
      - name: Pytest
        run: uv run pytest --cov=guardianmapstudio --cov-fail-under=80 -v
